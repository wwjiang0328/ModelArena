name: Daily Model Data Update

# ─── 触发条件 ─────────────────────────────────────────────────────────────────
on:
  # 每天北京时间 08:00（UTC 00:00）自动运行
  schedule:
    - cron: "0 0 * * *"

  # 支持在 GitHub Actions 页面手动触发（用于测试或紧急更新）
  workflow_dispatch:
    inputs:
      reason:
        description: "手动触发原因（可选）"
        required: false
        default: "Manual update"

# ─── 权限配置 ─────────────────────────────────────────────────────────────────
permissions:
  contents: write  # 允许 Actions Bot 推送 commit

# ─── 任务定义 ─────────────────────────────────────────────────────────────────
jobs:
  update-data:
    name: Fetch & Update Model Data
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. 检出代码（使用 PAT 以便后续推送触发 Vercel 部署）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 使用 Personal Access Token（PAT）推送，以触发 Vercel 的 GitHub 集成
          # 如果使用默认的 GITHUB_TOKEN，Vercel 可能不会检测到推送事件
          # 请在仓库 Settings → Secrets → Actions 中添加 PAT_TOKEN
          # PAT 需要 repo 权限（read + write）
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # 2. 配置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. 安装 pnpm（项目使用 pnpm 作为包管理器）
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 4. 安装依赖（仅安装根目录依赖，脚本运行所需）
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. 运行数据更新脚本
      - name: Run data update script
        run: node scripts/update-data.js
        env:
          # 如果使用策略 B（API 模式），在此处注入 API Key
          # SUPERCLUE_API_KEY: ${{ secrets.SUPERCLUE_API_KEY }}
          # BENCHLM_API_KEY: ${{ secrets.BENCHLM_API_KEY }}
          NODE_ENV: production

      # 6. 检查是否有文件变更
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet client/src/lib/models.json \
                            client/src/lib/benchlm.json \
                            client/src/lib/reference-models.json \
          && echo "changed=false" >> $GITHUB_OUTPUT \
          || echo "changed=true" >> $GITHUB_OUTPUT

      # 7. 提交并推送变更（仅在数据有变化时执行）
      - name: Commit and push updated data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add client/src/lib/models.json \
                  client/src/lib/benchlm.json \
                  client/src/lib/reference-models.json

          git commit -m "chore(data): auto-update model data $(date -u +'%Y-%m-%d')"
          git push

      # 8. 如果数据无变化，输出提示
      - name: No changes detected
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "✅ Data is already up to date. No commit needed."

      # 9. 输出运行摘要
      - name: Summary
        if: always()
        run: |
          echo "## 数据更新摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **运行时间**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **触发方式**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **数据变更**: ${{ steps.check_changes.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
            echo "- **状态**: ✅ 数据已更新并推送，Vercel 将自动触发重新部署" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **状态**: ℹ️ 数据无变化，跳过提交" >> $GITHUB_STEP_SUMMARY
          fi
