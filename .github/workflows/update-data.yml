name: Model Data Update Pipeline

# ─── 触发条件 ─────────────────────────────────────────────────────────────────
on:
  # 手动触发（数据更新不固定周期，以模型新品发布为准）
  workflow_dispatch:
    inputs:
      reason:
        description: "触发原因（可选，如：GLM-5 新版本发布）"
        required: false
        default: "Manual data update"
  # 如需定时检查，可取消下方注释（每天北京时间 08:00 = UTC 00:00）
  # schedule:
  #   - cron: "0 0 * * *"

# ─── 权限配置 ─────────────────────────────────────────────────────────────────
permissions:
  contents: write  # 允许 Actions Bot 推送 commit

# ─── 任务定义 ─────────────────────────────────────────────────────────────────
jobs:
  update-data:
    name: Build → Validate → Generate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. 检出代码（使用 PAT 以便后续推送触发 Vercel 部署）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 使用 Personal Access Token（PAT）推送，以触发 Vercel 的 GitHub 集成
          # 请在仓库 Settings → Secrets → Actions 中添加名为 PAT_TOKEN 的 Secret
          # PAT 需要 repo + workflow 权限
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # 2. 配置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. 安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 4. 安装依赖
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Step 1 — 标准化数据源
      - name: "[Step 1/3] Build: normalize data-source.json"
        run: node scripts/build-data.js

      # 6. Step 2 — 数据校验（失败则阻止后续步骤）
      - name: "[Step 2/3] Validate: check field integrity"
        run: node scripts/validate-data.js

      # 7. Step 3 — 生成前端文件 + 快照
      - name: "[Step 3/3] Generate: frontend files + snapshot"
        run: node scripts/generate-latest.js

      # 8. 检查是否有文件变更（前端消费文件）
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet \
            client/src/lib/models.json \
            client/src/lib/benchlm.json \
            client/src/lib/reference-models.json \
            client/src/lib/data-meta.json \
          && echo "changed=false" >> $GITHUB_OUTPUT \
          || echo "changed=true" >> $GITHUB_OUTPUT

      # 9. 提交并推送变更（仅在数据有变化时执行）
      - name: Commit and push updated data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 前端消费文件（触发 Vercel 重新部署）
          git add \
            client/src/lib/models.json \
            client/src/lib/benchlm.json \
            client/src/lib/reference-models.json \
            client/src/lib/data-meta.json

          # 中间标准化文件（供调试和追溯）
          git add scripts/sources/ || true

          # 历史快照（归档）
          git add scripts/snapshots/ || true

          # 获取数据截止日期用于 commit message
          DATA_DATE=$(node -e "const m=require('./client/src/lib/data-meta.json'); console.log(m.updatedAt)")
          BATCH_ID=$(node -e "const m=require('./client/src/lib/data-meta.json'); console.log(m.updateBatchId)")

          git commit -m "chore(data): update model data [cutoff: ${DATA_DATE}]

          Triggered by: ${{ github.event.inputs.reason || 'scheduled' }}
          Batch: ${BATCH_ID}"

          git push

      # 10. 如果数据无变化，输出提示
      - name: No changes detected
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "✅ Data is already up to date. No commit needed."

      # 11. 输出运行摘要
      - name: Summary
        if: always()
        run: |
          echo "## 数据更新流水线摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 字段 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 运行时间 | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| 触发方式 | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 触发原因 | ${{ github.event.inputs.reason || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 数据变更 | ${{ steps.check_changes.outputs.changed }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
            echo "| 状态 | ✅ 数据已更新并推送，Vercel 将自动触发重新部署 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 状态 | ℹ️ 数据无变化，跳过提交 |" >> $GITHUB_STEP_SUMMARY
          fi
